# Shared defaults — overridden by method-specific configs

model:
  name: meta-llama/Llama-3.2-3B-Instruct
  dtype: bfloat16

data:
  dataset: gsm8k
  train_split: "train[:6000]"
  val_split: "train[6000:6500]"
  seed: 42
  max_seq_length: 1024

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  optimizer: adamw_torch
  num_train_epochs: 2
  seed: 42
  bf16: true
  fp16: false
  gradient_checkpointing: true
  save_strategy: steps
  save_steps: 100
  eval_strategy: epoch
  logging_steps: 20
  report_to: none
