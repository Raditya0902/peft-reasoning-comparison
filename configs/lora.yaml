model:
  name: meta-llama/Llama-3.2-3B-Instruct
  dtype: bfloat16

data:
  dataset: gsm8k
  train_split: "train[:6000]"
  val_split: "train[6000:6500]"
  seed: 42
  max_seq_length: 1024

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, v_proj]
  bias: none
  task_type: CAUSAL_LM

training:
  output_dir: adapters/lora
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  optimizer: adamw_torch
  save_strategy: epoch
  eval_strategy: epoch
  logging_steps: 20
  seed: 42
  bf16: true
  fp16: false
  gradient_checkpointing: true
